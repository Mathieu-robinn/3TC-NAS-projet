!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
hostname PE3
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 1.0.0.3 255.255.255.255
 no shutdown
!
interface GigabitEthernet1/0
 description to_P3
 ip address 10.0.0.25 255.255.255.252
 no shutdown
 mpls ip
!
router ospf 1
 router-id 1.0.0.3
 network 1.0.0.3 0.0.0.0 area 0
 network 10.0.0.24 0.0.0.3 area 0
!
mpls ip
mpls label protocol ldp
mpls ldp router-id Loopback0 force
!
router bgp 1
 bgp router-id 1.0.0.3
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 1.0.0.1 remote-as 1
 neighbor 1.0.0.1 update-source Loopback0
 !
 address-family vpnv4
  neighbor 1.0.0.1 activate
  neighbor 1.0.0.1 send-community both
 exit-address-family
!
vrf definition CUST1
 rd 1:101
 address-family ipv4
  route-target export 1:101
  route-target import 1:101
 exit-address-family
!
interface GigabitEthernet2/0
 description to_CE1-2_CUST1
 vrf forwarding CUST1
 ip address 172.16.0.5 255.255.255.252
 no shutdown
!
router bgp 1
 address-family ipv4 vrf CUST1
  neighbor 172.16.0.6 remote-as 65001
  neighbor 172.16.0.6 activate
 exit-address-family
!
vrf definition CUST3
 rd 1:103
 address-family ipv4
  route-target export 1:103
  route-target import 1:103
 exit-address-family
!
interface GigabitEthernet3/0
 description to_CE3-1_CUST3
 vrf forwarding CUST3
 ip address 172.16.0.17 255.255.255.252
 no shutdown
!
router bgp 1
 address-family ipv4 vrf CUST3
  neighbor 172.16.0.18 remote-as 65003
  neighbor 172.16.0.18 activate
 exit-address-family
!
end
