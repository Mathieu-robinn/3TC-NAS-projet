interface GigabitEthernet3/0
no ip address 172.16.0.18 255.255.255.252
ip address 172.20.0.18 255.255.255.252
interface Loopback0
no ip address 10.0.0.4 255.255.255.255
ip address 10.20.0.4 255.255.255.255
router bgp 65003
