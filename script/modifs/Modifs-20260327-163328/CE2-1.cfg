interface GigabitEthernet3/0
no ip address 172.16.0.10 255.255.255.252
ip address 172.20.0.10 255.255.255.252
interface Loopback0
no description LAN_TEST_CUST2_CE2-1
no ip address 10.0.0.2 255.255.255.255
description LAN_TEST_CLIENT2_CE2-1
ip address 10.20.0.2 255.255.255.255
router bgp 65002
no bgp router-id 172.16.0.10
no neighbor 172.16.0.9 activate
no neighbor 172.16.0.9 remote-as 1
no network 10.0.0.2 mask 255.255.255.255
bgp router-id 172.20.0.10
neighbor 172.20.0.9 activate
neighbor 172.20.0.9 remote-as 1
network 10.20.0.2 mask 255.255.255.255
