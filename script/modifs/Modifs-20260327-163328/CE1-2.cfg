interface GigabitEthernet2/0
no ip address 172.16.0.6 255.255.255.252
ip address 172.20.0.6 255.255.255.252
interface Loopback0
no ip address 10.0.0.1 255.255.255.255
ip address 10.20.0.1 255.255.255.255
router bgp 65001
no bgp router-id 172.16.0.6
no neighbor 172.16.0.5 activate
no neighbor 172.16.0.5 remote-as 1
no network 10.0.0.1 mask 255.255.255.255
bgp router-id 172.20.0.6
neighbor 172.20.0.5 activate
neighbor 172.20.0.5 remote-as 1
network 10.20.0.1 mask 255.255.255.255
