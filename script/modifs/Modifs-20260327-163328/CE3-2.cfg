interface GigabitEthernet3/0
no ip address 172.16.0.22 255.255.255.252
ip address 172.20.0.22 255.255.255.252
interface Loopback0
no ip address 10.0.0.5 255.255.255.255
ip address 10.20.0.5 255.255.255.255
router bgp 65003
no bgp router-id 172.16.0.22
no neighbor 172.16.0.21 activate
no neighbor 172.16.0.21 remote-as 1
no network 10.0.0.5 mask 255.255.255.255
bgp router-id 172.20.0.22
neighbor 172.20.0.21 activate
neighbor 172.20.0.21 remote-as 1
network 10.20.0.5 mask 255.255.255.255
