interface GigabitEthernet2/0
no ip address 172.16.0.2 255.255.255.252
ip address 172.20.0.2 255.255.255.252
interface Loopback0
no ip address 10.0.0.0 255.255.255.255
ip address 10.20.0.0 255.255.255.255
no router bgp 65001
router bgp 65001
bgp router-id 172.20.0.2
bgp log-neighbor-changes
neighbor 172.20.0.1 remote-as 1
address-family ipv4
neighbor 172.20.0.1 activate
network 10.20.0.0 mask 255.255.255.255
exit-address-family
