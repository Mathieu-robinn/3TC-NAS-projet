!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
hostname PE2
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 1.0.0.2 255.255.255.255
 no shutdown
!
interface GigabitEthernet1/0
 description to_P2
 ip address 10.0.0.21 255.255.255.252
 no shutdown
 mpls ip
!
router ospf 1
 router-id 1.0.0.2
 network 1.0.0.2 0.0.0.0 area 0
 network 10.0.0.20 0.0.0.3 area 0
!
mpls ip
mpls label protocol ldp
mpls ldp router-id Loopback0 force
!
router bgp 1
 bgp router-id 1.0.0.2
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 1.0.0.1 remote-as 1
 neighbor 1.0.0.1 update-source Loopback0
 !
 address-family vpnv4
  neighbor 1.0.0.1 activate
  neighbor 1.0.0.1 send-community both
 exit-address-family
!
ip vrf CUST2
 rd 1:65002
 route-target export 1:65002
 route-target import 1:65002
!
interface GigabitEthernet2/0
 description to_CE2-2_CUST2
 ip vrf forwarding CUST2
 ip address 172.16.0.13 255.255.255.252
 no shutdown
!
router bgp 1
 address-family ipv4 vrf CUST2
  neighbor 172.16.0.14 remote-as 65002
  neighbor 172.16.0.14 activate
  neighbor 172.16.0.14 as-override
 exit-address-family
!
ip vrf CUST3
 rd 1:65003
 route-target export 1:65003
 route-target import 1:65003
!
interface GigabitEthernet3/0
 description to_CE3-2_CUST3
 ip vrf forwarding CUST3
 ip address 172.16.0.21 255.255.255.252
 no shutdown
!
router bgp 1
 address-family ipv4 vrf CUST3
  neighbor 172.16.0.22 remote-as 65003
  neighbor 172.16.0.22 activate
  neighbor 172.16.0.22 as-override
 exit-address-family
!
end
