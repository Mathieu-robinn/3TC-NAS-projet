!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
hostname PE2
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 1.0.0.2 255.255.255.255
 no shutdown
!
interface GigabitEthernet1/0
 description to_P2
 ip address 10.0.0.21 255.255.255.252
 no shutdown
 mpls ip
!
router isis 1
 net 49.0001.0001.0001.0001.00
 is-type level-2-only
!
interface GigabitEthernet1/0
 ip router isis 1
!
mpls ip
mpls label protocol ldp
mpls ldp router-id Loopback0 force
!
router bgp 1
 bgp router-id 1.0.0.2
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 1.0.0.1 remote-as 1
 neighbor 1.0.0.1 update-source Loopback0
 neighbor 1.0.0.3 remote-as 1
 neighbor 1.0.0.3 update-source Loopback0
 !
 address-family vpnv4
  neighbor 1.0.0.1 activate
  neighbor 1.0.0.1 send-community both
  neighbor 1.0.0.1 route-reflector-client
  neighbor 1.0.0.3 activate
  neighbor 1.0.0.3 send-community both
  neighbor 1.0.0.3 route-reflector-client
 exit-address-family
!
vrf definition CLIENT2
 rd 1:102
 address-family ipv4
  route-target export 1:102
  route-target import 1:102
 exit-address-family
!
interface GigabitEthernet2/0
 description to_CE2-2_CLIENT2
 ip vrf forwarding CLIENT2
 ip address 172.20.0.13 255.255.255.252
 no shutdown
!
router bgp 1
 address-family ipv4 vrf CLIENT2
  neighbor 172.20.0.14 remote-as 65002
  neighbor 172.20.0.14 activate
  neighbor 172.20.0.14 as-override
 exit-address-family
!
vrf definition CUST3
 rd 1:103
 address-family ipv4
  route-target export 1:103
  route-target import 1:103
 exit-address-family
!
interface GigabitEthernet3/0
 description to_CE3-2_CUST3
 ip vrf forwarding CUST3
 ip address 172.20.0.21 255.255.255.252
 no shutdown
!
router bgp 1
 address-family ipv4 vrf CUST3
  neighbor 172.20.0.22 remote-as 65003
  neighbor 172.20.0.22 activate
  neighbor 172.20.0.22 as-override
 exit-address-family
!
end
