!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
hostname CE3-2
!
no ip domain-lookup
ip cef
!
interface GigabitEthernet3/0
 description to_PE2
 ip address 172.20.0.22 255.255.255.252
 no shutdown
!
interface Loopback0
 description LAN_TEST_CUST3_CE3-2
 ip address 10.20.0.5 255.255.255.255
 no shutdown
!
router bgp 65003
 bgp router-id 172.20.0.22
 bgp log-neighbor-changes
 neighbor 172.20.0.21 remote-as 1
 !
 address-family ipv4
  neighbor 172.20.0.21 activate
  network 10.20.0.5 mask 255.255.255.255
 exit-address-family
!
end
