!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
hostname CE2-2
!
no ip domain-lookup
ip cef
!
interface GigabitEthernet2/0
 description to_PE2
 ip address 172.16.0.14 255.255.255.252
 no shutdown
!
interface Loopback0
 description LAN_TEST_CUST2_CE2-2
 ip address 10.0.0.3 255.255.255.255
 no shutdown
!
router bgp 65002
 bgp router-id 172.16.0.14
 bgp log-neighbor-changes
 neighbor 172.16.0.13 remote-as 1
 !
 address-family ipv4
  neighbor 172.16.0.13 activate
  network 10.0.0.3 mask 255.255.255.255
 exit-address-family
!
end
