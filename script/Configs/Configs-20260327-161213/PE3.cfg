!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
hostname PE3
!
no ip domain-lookup
ip cef
!
interface Loopback0
 ip address 1.0.0.3 255.255.255.255
 no shutdown
!
interface GigabitEthernet1/0
 description to_P3
 ip address 10.0.0.25 255.255.255.252
 no shutdown
 mpls ip
!
router isis 1
 net 49.0001.0001.0001.0001.00
 is-type level-2-only
!
interface GigabitEthernet1/0
 ip router isis 1
!
mpls ip
mpls label protocol ldp
mpls ldp router-id Loopback0 force
!
router bgp 1
 bgp router-id 1.0.0.3
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 1.0.0.1 remote-as 1
 neighbor 1.0.0.1 update-source Loopback0
 neighbor 1.0.0.2 remote-as 1
 neighbor 1.0.0.2 update-source Loopback0
 !
 address-family vpnv4
  neighbor 1.0.0.1 activate
  neighbor 1.0.0.1 send-community both
  neighbor 1.0.0.2 activate
  neighbor 1.0.0.2 send-community both
 exit-address-family
!
vrf definition CUST1
 rd 1:101
 address-family ipv4
  route-target export 1:101
  route-target import 1:101
 exit-address-family
!
interface GigabitEthernet2/0
 description to_CE1-2_CUST1
 ip vrf forwarding CUST1
 ip address 172.20.0.5 255.255.255.252
 no shutdown
!
router bgp 1
 address-family ipv4 vrf CUST1
  neighbor 172.20.0.6 remote-as 65001
  neighbor 172.20.0.6 activate
  neighbor 172.20.0.6 as-override
 exit-address-family
!
vrf definition CUST3
 rd 1:103
 address-family ipv4
  route-target export 1:103
  route-target import 1:103
 exit-address-family
!
interface GigabitEthernet3/0
 description to_CE3-1_CUST3
 ip vrf forwarding CUST3
 ip address 172.20.0.17 255.255.255.252
 no shutdown
!
router bgp 1
 address-family ipv4 vrf CUST3
  neighbor 172.20.0.18 remote-as 65003
  neighbor 172.20.0.18 activate
  neighbor 172.20.0.18 as-override
 exit-address-family
!
end
