!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
hostname CE3-2
!
no ip domain-lookup
ip cef
!
interface GigabitEthernet3/0
 description to_PE2
 ip address 172.16.0.22 255.255.255.252
 no shutdown
!
router bgp 65003
 bgp router-id 172.16.0.22
 bgp log-neighbor-changes
 neighbor 172.16.0.21 remote-as 1
 !
 address-family ipv4
  neighbor 172.16.0.21 activate
 exit-address-family
!
end
