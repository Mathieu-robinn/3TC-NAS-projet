!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
hostname CE2-1
!
no ip domain-lookup
ip cef
!
interface GigabitEthernet3/0
 description to_PE1
 ip address 172.20.0.10 255.255.255.252
 no shutdown
!
interface Loopback0
 description LAN_TEST_CLIENT2_CE2-1
 ip address 10.20.0.2 255.255.255.255
 no shutdown
!
router bgp 65002
 bgp router-id 172.20.0.10
 bgp log-neighbor-changes
 neighbor 172.20.0.9 remote-as 1
 !
 address-family ipv4
  neighbor 172.20.0.9 activate
  network 10.20.0.2 mask 255.255.255.255
 exit-address-family
!
end
