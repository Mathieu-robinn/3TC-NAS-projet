!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
hostname CE1-2
!
no ip domain-lookup
ip cef
!
interface GigabitEthernet2/0
 description to_PE3
 ip address 172.16.0.6 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1.202
 encapsulation dot1Q 202
 description LAN_TEST_CUST1_CE1-2
 ip address 10.0.0.1 255.255.255.255
 no shutdown
!
router bgp 65001
 bgp router-id 172.16.0.6
 bgp log-neighbor-changes
 neighbor 172.16.0.5 remote-as 1
 !
 address-family ipv4
  neighbor 172.16.0.5 activate
  redistribute connected route-map RM_LAN_ONLY
 exit-address-family
!
route-map RM_LAN_ONLY permit 10
 match interface GigabitEthernet0/1.202
!
end
